services:
  station-app:
    env_file:
      - .env
    ports:
      - "8082:8082"
    networks:
      - sparkflow-network

  station-db:
    env_file:
      - .env
    networks:
      - sparkflow-network

  user-app:
    env_file:
      - .env
    ports:
      - "8081:8081"
    networks:
      - sparkflow-network

  user-db:
    env_file:
      - .env
    networks:
      - sparkflow-network
  
  frontend:
    ports:
      - "3000:3000"
    env_file:
      - .env
    networks:
      - sparkflow-network

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - station-app
      - user-app
    networks:
      - sparkflow-network

networks:
  sparkflow-network:
    driver: bridge

