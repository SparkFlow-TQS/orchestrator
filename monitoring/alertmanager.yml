global:
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'steixeira2004@gmail.com'
  smtp_auth_username: 'steixeira2004@gmail.com'
  smtp_auth_password: 'cmez abcn cigz vefu '
  smtp_require_tls: true

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default-receiver'
  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
      group_wait: 10s
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'warning-receiver'
      repeat_interval: 8h

receivers:
  - name: 'default-receiver'
    email_configs:
      - to: 'sebastiao.teixeira@ua.pt'

  - name: 'critical-receiver'
    email_configs:
      - to: 'sebastiao.teixeira@ua.pt'
        headers:
          Subject: '🚨 CRITICAL ALERT: {{ .GroupLabels.alertname }}'

  - name: 'warning-receiver'
    email_configs:
      - to: 'sebastiao.teixeira@ua.pt'
        headers:
          Subject: '⚠️ Warning Alert: {{ .GroupLabels.alertname }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']