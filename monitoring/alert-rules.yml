groups:
  - name: sparkflow_alerts
    rules:
      # Service Down Alerts
      - alert: NginxDown
        expr: up{job="nginx-exporter"} == 0
        for: 30s
        labels:
          severity: critical
          service: nginx
        annotations:
          summary: "Nginx service is down"
          description: "Nginx has been down for more than 30 seconds"

      - alert: StationServiceDown
        expr: up{job="station-service"} == 0
        for: 30s
        labels:
          severity: critical
          service: station-service
        annotations:
          summary: "Station Service is down"
          description: "Station Service has been down for more than 30 seconds"

      - alert: UserServiceDown
        expr: up{job="user-service"} == 0
        for: 30s
        labels:
          severity: critical
          service: user-service
        annotations:
          summary: "User Service is down"
          description: "User Service has been down for more than 30 seconds"

      - alert: FrontendDown
        expr: up{job="frontend"} == 0
        for: 30s
        labels:
          severity: critical
          service: frontend
        annotations:
          summary: "Frontend service is down"
          description: "Frontend service has been down for more than 30 seconds"

      - alert: OpenChargeMapAPIDown
        expr: probe_success{job="blackbox"} == 0
        for: 2m
        labels:
          severity: warning
          service: external-api
        annotations:
          summary: "OpenChargeMap API is down"
          description: "OpenChargeMap API has been unreachable for more than 2 minutes"

      # System Resource Alerts
      - alert: HighCPUUsage
        expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          resource: cpu
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is above 80% for more than 5 minutes (current: {{ $value }}%)"

      - alert: CriticalCPUUsage
        expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 2m
        labels:
          severity: critical
          resource: cpu
        annotations:
          summary: "Critical CPU usage detected"
          description: "CPU usage is above 90% for more than 2 minutes (current: {{ $value }}%)"

      - alert: HighMemoryUsage
        expr: ((node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
          resource: memory
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is above 85% for more than 5 minutes (current: {{ $value }}%)"

      - alert: CriticalMemoryUsage
        expr: ((node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes) * 100 > 95
        for: 2m
        labels:
          severity: critical
          resource: memory
        annotations:
          summary: "Critical memory usage detected"
          description: "Memory usage is above 95% for more than 2 minutes (current: {{ $value }}%)"

      # Application Performance Alerts
      - alert: HighErrorRate
        expr: rate(nginx_http_requests_total{status=~"5.."}[5m]) / rate(nginx_http_requests_total[5m]) * 100 > 10
        for: 5m
        labels:
          severity: warning
          service: nginx
        annotations:
          summary: "High error rate detected"
          description: "Nginx error rate is above 10% for more than 5 minutes (current: {{ $value }}%)"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 10
        for: 1m
        labels:
          severity: critical
          resource: disk
        annotations:
          summary: "Low disk space"
          description: "Disk space is below 10% (current: {{ $value }}%)"